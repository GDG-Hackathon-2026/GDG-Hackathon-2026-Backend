services:
  app:
    image: ${DOCKERHUB_USERNAME}/gdg-2026-backend:latest
    container_name: gdg-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/gcp-sa.json}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-1.2}
      GEMINI_TOP_P: ${GEMINI_TOP_P:-0.95}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-/app/firebase-sa.json}
      CARBON_G_PER_1K_INPUT: ${CARBON_G_PER_1K_INPUT:-0.015}
      CARBON_G_PER_1K_OUTPUT: ${CARBON_G_PER_1K_OUTPUT:-0.025}
    volumes:
      - ./gcp-sa.json:/app/gcp-sa.json:ro
      - ./firebase-sa.json:/app/firebase-sa.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared

  mysql:
    image: mysql:8.0
    container_name: gdg-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shared

  prometheus:
    image: prom/prometheus:latest
    container_name: gdg-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - shared

  grafana:
    image: grafana/grafana:latest
    container_name: gdg-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - shared

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  shared:
    name: shared
    external: true
