spring:
  application:
    name: 2026gdg
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8080
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

gemini:
  project: ${GOOGLE_CLOUD_PROJECT:}
  location: ${GOOGLE_CLOUD_LOCATION:us-central1}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  # 생성 파라미터 — 장황/창의적 답변 유도 위해 약간 상향 (모델 기본 1.0)
  temperature: ${GEMINI_TEMPERATURE:1.2}
  top-p: ${GEMINI_TOP_P:0.95}
  # 출력 토큰 상한. Gemini 2.5 Flash 의 max 는 8192. 너무 낮게 잡으면 답변이 잘림.
  # stage 기반 입력 축소와 독립적으로 적용되어 "기억은 흐릿해도 수다는 끝이 없다" 유지.
  max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:8192}
  # true 면 POST /api/gemini/generate 가 인증 없이 공개됨 (프롬프트 엔지니어링 반복 호출용).
  # 누구나 Gemini 를 호출할 수 있으므로 빌링 남용 위험 — 해커톤 기간 외에는 false.
  raw-public: ${GEMINI_RAW_PUBLIC:false}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

carbon:
  g-per-1k-input-tokens: ${CARBON_G_PER_1K_INPUT:0.015}
  g-per-1k-output-tokens: ${CARBON_G_PER_1K_OUTPUT:0.025}
  # /api/stats/carbon 응답 equivalents 블록의 환산 상수.
  # 출처:
  #   해빙: Notz & Stroeve 2016 (Science) — 1 ton CO₂ ≈ 3 m² 북극 9월 해빙 영구 손실
  #   자동차: 환경부 "2016~2020년 자동차 온실가스 관리제도 이행실적" — 2020년 국내 실제
  #          판매실적 가중평균 141.3 g/km (인센티브 미반영)
  #   폰: US EPA Greenhouse Gas Equivalencies Calculator (2022 eGRID) —
  #       1.24×10⁻⁵ metric tons CO₂/charge = 12.4 g
  equivalents:
    sea-ice-m2-per-ton: ${CARBON_EQ_SEA_ICE_M2_PER_TON:3.0}
    car-g-per-km: ${CARBON_EQ_CAR_G_PER_KM:141.3}
    phone-g-per-charge: ${CARBON_EQ_PHONE_G_PER_CHARGE:12.4}

chat:
  prompt:
    # raw endpoint (POST /api/gemini/generate) 의 fallback 시스템 프롬프트.
    # 일반 대화 (POST /api/conversations/{id}/messages) 는 대화에 저장된 persona 키로 매핑되므로
    # 이 값과 무관. 페르소나 전체 목록은 Persona enum 참고.
    active-template: ${CHAT_PROMPT_TEMPLATE:polar-bear-grandpa}

# 개발·테스트 전용 Firebase 인증 우회.
# true 일 때만 X-Dev-Uid 헤더를 받아 그 값을 uid 로 세팅. 실배포 기본은 false.
dev:
  auth:
    bypass: ${DEV_AUTH_BYPASS:false}
