spring:
  application:
    name: 2026gdg
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8080
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

gemini:
  project: ${GOOGLE_CLOUD_PROJECT:}
  location: ${GOOGLE_CLOUD_LOCATION:us-central1}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

carbon:
  g-per-1k-input-tokens: ${CARBON_G_PER_1K_INPUT:0.015}
  g-per-1k-output-tokens: ${CARBON_G_PER_1K_OUTPUT:0.025}

chat:
  prompt:
    active-template: ${CHAT_PROMPT_TEMPLATE:polar-bear}
