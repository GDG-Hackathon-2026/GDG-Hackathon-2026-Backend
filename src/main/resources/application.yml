spring:
  application:
    name: 2026gdg
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: 8080
  forward-headers-strategy: framework
